{
  "schema_version": 1,
  "public_api": {
    "compatibility": "exact",
    "protected_paths": [
      "provided-api/**",
      "grader/**",
      "src/**/api/**",
      "src/**/contract/**"
    ],
    "protected_symbols": [],
